<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalSeat - Login</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .auth-subtitle {
            color: #c9d1d9;
            margin-top: -8px;
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="brand">GoalSeat</div>

        <nav class="nav-links">
            <a href="home.html">Home</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Signup</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="auth-page">
        <section class="auth-card">
            <div class="auth-image">
                <img src="stadium.jpg" alt="Football stadium" usemap="#aboutMap">
                <map name="aboutMap">
                    <area shape="rect" coords="0,0,800,800" href="about.html" alt="About Us">
                </map>
            </div>

            <div class="auth-form-side">
                <h1>Login</h1>
                <p class="auth-subtitle">Access your booking account</p>

                <form class="auth-form" onsubmit="return validateLogin()">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="example@gmail.com">

                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">

                    <input type="submit" value="Login" class="btn-submit">
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© GoalSeat</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
