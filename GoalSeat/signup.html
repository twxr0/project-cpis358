<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalSeat - Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <div class="brand">GoalSeat</div>

        <nav class="nav-links">
            <a href="home.html">Home</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Signup</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="auth-page">
        <section class="auth-card">
            <div class="auth-image">
                <img src="stadium.jpg" alt="Football stadium" usemap="#aboutMap">
                <map name="aboutMap">
                    <area shape="rect" coords="0,0,800,800" href="about.html" alt="About Us">
                </map>
            </div>

            <div class="auth-form-side">
                <h1>Create Account</h1>
                <p class="auth-subtitle">Sign up to start browsing football tickets</p>

                <form class="auth-form" onsubmit="return validateSignUp()">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your full name">

                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@gmail.com">

                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="05xxxxxxxx">

                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password">

                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password">

                    <input type="submit" value="Create Account" class="btn-submit">
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© GoalSeat</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
