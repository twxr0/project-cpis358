<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalSeat - Signup</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .signup-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        .signup-box {
            width: 420px;
            background: #2b2b2b;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #888;
            box-shadow: 0px 0px 8px rgba(0,0,0,0.4);
            color: lightblue;
            text-align: center;
        }

        .signup-box h2 {
            color: lightblue;
            margin-bottom: 25px;
        }

        .login-text {
            margin-top: 25px;
            color: lightblue;
            text-align: center;
        }

        .login-text a {
            color: lightblue;
        }
    </style>
</head>
<body>

    <header>
        <h1>GoalSeat</h1>

        <div class="menu">
            <a href="home.html">Home</a> |
            <a href="login.html">Login</a> |
            <a href="signup.html">Signup</a> |
            <a href="about.html">About</a>
        </div>
    </header>

    <figure class="page-image-box">
        <a href="about.html">
            <img class="page-image" src="main-image.png" usemap="#aboutMap" alt="GoalSeat image">
        </a>

        <map name="aboutMap">
            <area shape="rect" coords="0,0,640,360" href="about.html" alt="About GoalSeat">
        </map>
    </figure>

    <div class="signup-wrapper">
        <div class="signup-box">
            <h2>Create Account</h2>

            <form onsubmit="return validateSignUp()" class="signup-form">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" placeholder="Your full name">

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="example@gmail.com">

                <label for="phone">Phone Number:</label>
                <input type="text" id="phone" placeholder="0551234567">

                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter password">

                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password">

                <input type="submit" value="Create Account" class="submit-btn">
            </form>

            <p id="signupMessage"></p>
            <p class="login-text">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
