<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoalSeat - Signup</title>
    <link rel="stylesheet" type="text/css" href="style.css">

    <style type="text/css">
        .signup-title {
            color: lightblue;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>GoalSeat</h1>

        <nav class="menu">
            <a href="home.html">Home</a> |
            <a href="login.html">Login</a> |
            <a href="signup.html">Signup</a> |
            <a href="about.html">About</a>
        </nav>
    </header>

    <figure class="page-image-box">
        <img class="page-image" src="AboutUs.png" usemap="#aboutMap" alt="GoalSeat image">
        <map name="aboutMap">
            <area shape="rect" coords="0,0,320,180" href="about.html" alt="About Us">
        </map>
        <figcaption>Click the image to open About Us</figcaption>
    </figure>

    <article>
        <section class="box">
            <h2 class="signup-title">Create Account</h2>

            <form onsubmit="return validateSignUp()">
                <p>
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" placeholder="Your full name">
                </p>

                <p>
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="example@gmail.com">
                </p>

                <p>
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" placeholder="05xxxxxxxx">
                </p>

                <p>
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter password">
                </p>

                <p>
                    <label for="confirmPassword">Confirm Password:</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password">
                </p>

                <p>
                    <input type="submit" value="Create Account">
                    <input type="reset" value="Reset">
                </p>
            </form>

            <p id="signupMessage"></p>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </section>
    </article>

    <footer>GoalSeat</footer>

    <script type="text/javascript" src="script.js"></script>
</body>
</html>
