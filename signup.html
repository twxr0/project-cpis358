<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalSeat - Signup</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .signup-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        .signup-box {
            width: 420px;
            background: #2b2b2b;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #888;
            box-shadow: 0px 0px 8px rgba(0,0,0,0.4);
            color: lightblue;
            text-align: center;
        }

        .signup-box h2 {
            color: lightblue;
            margin-bottom: 25px;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .signup-form label {
            color: lightblue;
            margin-bottom: 6px;
            font-size: 16px;
        }

        .signup-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            background-color: #1f1f1f;
            color: white;
            border: 1px solid #555;
            font-size: 15px;
            box-sizing: border-box;
        }

        .signup-form .submit-btn {
            width: 160px;
            margin: 10px auto 0;
            cursor: pointer;
        }

        .login-text {
            margin-top: 25px;
            color: lightblue;
            text-align: center;
        }

        .login-text a {
            color: lightblue;
        }
    </style>
</head>
<body>

    <header>
        <h1>GoalSeat</h1>
        <div class="menu">
            <a href="home.html">Home</a> |
            <a href="login.html">Login</a> |
            <a href="signup.html">Signup</a> |
            <a href="about.html">About</a>
        </div>
    </header>

    <div class="signup-wrapper">
        <div class="signup-box">
            <h2>Create Account</h2>

            <form onsubmit="return validateSignUp()" class="signup-form">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" placeholder="Your full name">

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="example@gmail.com">

                <label for="phone">Phone Number:</label>
                <input type="text" id="phone" placeholder="05xxxxxxxx">

                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter password">

                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password">

                <input type="submit" value="Create Account" class="submit-btn">
            </form>

            <p class="login-text">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
