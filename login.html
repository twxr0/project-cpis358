<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalSeat - Login</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .box {
            width: 85%;
            margin: 40px auto;
            background: #2b2b2b;
            padding: 30px 20px;
            border-radius: 10px;
            border: 2px solid #888;
            box-shadow: 0px 0px 8px rgba(0,0,0,0.4);
            color: lightblue;
            text-align: center;
        }

        .box * {
            color: lightblue;
        }
    </style>
</head>
<body>

    <header>
        <h1>GoalSeat</h1>

        <div class="menu">
            <a href="home.html">Home</a> |
            <a href="login.html">Login</a> |
            <a href="signup.html">Signup</a> |
            <a href="about.html">About</a>
        </div>
    </header>

    <figure class="page-image-box">
        <a href="about.html">
            <img class="page-image" src="main-image.png" usemap="#aboutMap" alt="GoalSeat image">
        </a>

        <map name="aboutMap">
            <area shape="rect" coords="0,0,640,360" href="about.html" alt="About GoalSeat">
        </map>
    </figure>

    <div class="box">
        <h2>Login</h2>

        <form onsubmit="return validateLogin()">
            <label for="loginEmail">Email:</label>
            <input type="email" id="loginEmail" placeholder="example@gmail.com">

            <label for="loginPassword">Password:</label>
            <input type="password" id="loginPassword" placeholder="Enter your password">

            <br>

            <input type="submit" value="Login">
        </form>

        <p id="loginMessage"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
