<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoalSeat - Login</title>
    <link rel="stylesheet" type="text/css" href="style.css">

    <style type="text/css">
        .login-title {
            color: lightblue;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>GoalSeat</h1>

        <nav class="menu">
            <a href="home.html">Home</a> |
            <a href="login.html">Login</a> |
            <a href="signup.html">Signup</a> |
            <a href="about.html">About</a>
        </nav>
    </header>

    <figure class="page-image-box">
        <img class="page-image" src="AboutUs.png" usemap="#aboutMap" alt="GoalSeat image">
        <map name="aboutMap">
            <area shape="rect" coords="0,0,320,180" href="about.html" alt="About Us">
        </map>
        <figcaption>Click the image to open About Us</figcaption>
    </figure>

    <article>
        <section class="box">
            <h2 class="login-title">Login</h2>

            <form onsubmit="return validateLogin()">
                <p>
                    <label for="loginEmail">Email:</label>
                    <input type="email" id="loginEmail" placeholder="example@gmail.com">
                </p>

                <p>
                    <label for="loginPassword">Password:</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </p>

                <p>
                    <input type="submit" value="Login">
                    <input type="reset" value="Reset">
                </p>
            </form>

            <p id="loginMessage"></p>
        </section>
    </article>

    <footer>GoalSeat</footer>

    <script type="text/javascript" src="script.js"></script>
</body>
</html>
